name: Helloworkflow

on: [push]

jobs:
 Hello:
  runs-on: ubunto-latest
  steps:
    - name: ShowMessage 
      run: echo "Hello Workflow"
    - name: ListDir
      run: ls -alh
    - name: Checkout
      uses: actions/checkout@v4
    - name: SetupPython
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: CheckPythonVersion
      run: python --version